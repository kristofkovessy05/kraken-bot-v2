#config/settings.yaml

# MARKET MAKER BOT V3 - Mid price alapú, aszimmetrikus momentum védelemmel

sandbox: false

trading:
  symbol: "PEPE/USD"
  
  # 🔥 SPREAD BEÁLLÍTÁSOK (mid price alapú)
  base_half_spread: 0.006      # 0.6% fél spread → teljes spread 1.2%
  min_half_spread: 0.00275     # 0.275% minimum (maker fee 1.1x)
  max_half_spread: 0.01        # 1.0% maximum (védelem extrém esetben)
  
  # 🔥 MOMENTUM VÉDELEM (teljesülés után)
  momentum:
    cooldown_seconds: 5        # Ennyi másodpercig tart a védelem
    ask_multiplier: 2.0        # ASK teljesülés után: ASK spread x2.0
    bid_multiplier: 2.0        # BID teljesülés után: BID spread x2.0
  
  # 🔥 REBALANCE (inventory skew)
  target_ratio_base: 0.5
  target_ratio_quote: 0.5
  max_skew: 0.005              # 0.5% maximum skew (a config-ból olvasva)
  
  # Order méret
  order_size_percent: 0.10
  interval_seconds: 5

  # 🔥 NAPI VESZTESÉG LIMIT (százalékban)
  daily_loss_percent: 3.0   # maximum 3% drawdown naponta
  
  # Díjak
  maker_fee: 0.0025            # 0.25%
  
  # Volatilitás (opcionális, extra védelem)
  volatility:
    atr_period: 14
    atr_extra_multiplier: 0.2  # 0.2 = 20% (kezdetnek kisebb)

logging:
  level: "INFO"
  file: "logs/bot.log"

telegram_enabled: true